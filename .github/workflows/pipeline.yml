name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore identity.sln

      - name: Build
        run: dotnet build identity.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test identity.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --logger trx --results-directory TestResults
